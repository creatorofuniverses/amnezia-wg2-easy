<!DOCTYPE html>
<html>

<head>
  <title>AmneziaWG</title>
  <meta charset="utf-8"/>
  <link href="./css/app.css" rel="stylesheet">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="img/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="./img/apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<style>
  @font-face { font-family: "Manrope"; font-weight: 400; font-display: swap; src: url("./fonts/Manrope-Regular.ttf") format("truetype"); }
  @font-face { font-family: "Manrope"; font-weight: 500; font-display: swap; src: url("./fonts/Manrope-Medium.ttf") format("truetype"); }
  @font-face { font-family: "Manrope"; font-weight: 600; font-display: swap; src: url("./fonts/Manrope-SemiBold.ttf") format("truetype"); }
  @font-face { font-family: "Manrope"; font-weight: 700; font-display: swap; src: url("./fonts/Manrope-Bold.ttf") format("truetype"); }
  @font-face { font-family: "JetBrains Mono"; font-weight: 400; font-display: swap; src: url("./fonts/JetBrainsMono-Regular.ttf") format("truetype"); }
  @font-face { font-family: "JetBrains Mono"; font-weight: 500; font-display: swap; src: url("./fonts/JetBrainsMono-Medium.ttf") format("truetype"); }

  [v-cloak] {
    display: none;
  }

  /* ── Network Teal / Material 3 Design Tokens ─────────────── */

  :root {
  /* ---- Primary ---- */
  --primary:               #0D9488;
  --on-primary:            #FFFFFF;
  --primary-container:     #CCFBF1;
  --on-primary-container:  #00201B;

  /* ---- Secondary (selection / tonal) ---- */
  --secondary-container:   #CCE8E1;
  --on-secondary-container:#06201B;

  /* ---- Surfaces (M3 container ladder) ---- */
  --background:                #F4F6F8;
  --surface:                   #F4F6F8;
  --surface-container-lowest:  #FFFFFF;
  --surface-container-low:     #FAFBFC;
  --surface-container:         #FFFFFF;
  --surface-container-high:    #F6F8FA;
  --surface-container-highest: #F1F3F6;
  --surface-bright:            #FFFFFF;
  --surface-dim:               #D8DCE1;
  --surface-variant:           #DCE0E6;

  /* ---- Text on surface ---- */
  --on-surface:          #16181B;
  --on-surface-variant:  #5B6066;

  /* ---- Lines ---- */
  --outline:          #74777F;
  --outline-variant:  #E2E5EA;

  /* ---- Elevated-surface tint ---- */
  --surface-tint:  #0D9488;

  /* ---- Connected / active client row ---- */
  --connected-fill:    #ECFDF8;
  --connected-stroke:  #99E6D8;

  /* ---- Status (meaning constant across themes) ---- */
  --status-connected:     #16A34A;
  --status-connecting:    #B45309;
  --status-disconnected:  #8A9099;
  --error:                #BA1A1A;
  --error-container:      #FFDAD6;
  --on-error-container:   #410002;

  /* ---- Type ---- */
  --font-sans: "Manrope", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
  --weight-regular: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;

  /* role sizes */
  --type-title:        22px;  /* screen / toolbar title — SemiBold */
  --type-client-name:  16px;  /* client name — SemiBold */
  --type-section:      11px;  /* INTERFACE / OBFUSCATION / PEER — SemiBold caps, ls .12em */
  --type-field-value:  15px;  /* field value — Medium */
  --type-field-label:  12px;  /* field label — Regular */
  --type-status:       14px;  /* status — SemiBold */
  --type-stat-label:   11px;  /* DOWNLOAD / UPLOAD — SemiBold caps, ls .05em */
  --type-mono:         13px;  /* stat values, keys, IPs */
  --type-button:       14px;  /* button — SemiBold */

  /* ---- Shape ---- */
  --radius-input:     12px;
  --radius-card:      16px;
  --radius-list-row:  18px;
  --radius-pill:      999px;

  /* ---- Spacing (4px grid) ---- */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 24px;
  --card-padding: 16px;
  --card-gap: 12px;

  /* ---- Elevation (tonal-first; cards flat) ---- */
  --elevation-card:   none;
  --elevation-modal:  0 12px 40px rgba(16,24,40,0.16);
  }

  .dark {
  --primary:               #2DD4BF;
  --on-primary:            #06231F;
  --primary-container:     #0F3D38;
  --on-primary-container:  #5EEAD4;

  --secondary-container:   #2A413D;
  --on-secondary-container:#CDE9E2;

  --background:                #0E0F11;
  --surface:                   #0E0F11;
  --surface-container-lowest:  #08090A;
  --surface-container-low:     #131518;
  --surface-container:         #16181B;
  --surface-container-high:    #202327;
  --surface-container-highest: #2A2E33;
  --surface-bright:            #34373C;
  --surface-dim:               #0C0D0F;
  --surface-variant:           #2C3137;

  --on-surface:          #E6E8EC;
  --on-surface-variant:  #9AA0A8;

  --outline:          #8E9099;
  --outline-variant:  #23272C;

  --surface-tint:  #2DD4BF;

  --connected-fill:    #14211F;
  --connected-stroke:  #1E3A36;

  --status-connected:     #4ADE80;
  --status-connecting:    #FBBF24;
  --status-disconnected:  #6B7178;
  --error:                #F87171;
  --error-container:      #93000A;
  --on-error-container:   #FFDAD6;

  --elevation-modal:  0 16px 48px rgba(0,0,0,0.55);
  }

  * {
    font-family: var(--font-sans) !important;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background: var(--background) !important;
    min-height: 100vh;
    transition: background-color 0.3s ease;
  }

  /* ── Cards ─────────────────────────────────────────────────── */

  .awg-card { background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: var(--radius-card); box-shadow: none; overflow: hidden; }

  /* Delete / danger button */
  .awg-btn-danger { background-color: var(--error) !important; color: #fff !important; border-radius: var(--radius-input); }
  .awg-btn-danger:hover { filter: brightness(0.96); }

  /* ── Online indicator ──────────────────────────────────────── */

  .awg-online-dot { background-color: var(--status-connected) !important; box-shadow: none; }
  .awg-offline-dot { background-color: var(--status-disconnected) !important; }

  /* ── Header ────────────────────────────────────────────────── */

  .awg-title {
    font-family: var(--font-sans) !important;
    font-size: var(--type-title);
    font-weight: var(--weight-semibold);
    letter-spacing: -0.01em;
  }

  .awg-subtitle {
    font-family: var(--font-mono) !important;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--on-surface-variant);
  }

  /* ── Buttons ───────────────────────────────────────────────── */

  .awg-btn { border-radius: var(--radius-input); font-weight: var(--weight-semibold); font-size: var(--type-button); transition: background-color .15s ease, transform .1s ease; }
  .awg-btn:active { transform: scale(0.98); }
  .awg-btn-primary { background-color: var(--primary) !important; color: var(--on-primary) !important; border: none !important; }
  .awg-btn-primary:hover { filter: brightness(0.96); }
  .awg-btn-primary.is-disabled, .awg-btn-primary:disabled { background-color: var(--surface-variant) !important; color: var(--on-surface-variant) !important; }
  .awg-btn-tonal { background-color: var(--primary-container) !important; color: var(--on-primary-container) !important; border: none !important; border-radius: var(--radius-input); font-weight: var(--weight-semibold); }
  .awg-btn-text { background: transparent !important; color: var(--on-surface-variant) !important; }

  /* Icon buttons */
  .awg-icon-btn { border-radius: var(--radius-input); padding: .5rem; background: transparent; color: var(--on-surface-variant); transition: background-color .15s ease, color .15s ease; }
  .awg-icon-btn:hover { background-color: var(--surface-container-highest); color: var(--on-surface); }
  .awg-icon-btn--active { background-color: var(--primary-container) !important; color: var(--on-primary-container) !important; }

  /* ── Toggle switch ─────────────────────────────────────────── */

  .awg-toggle-on { background: var(--primary) !important; }
  .awg-toggle-off { background: var(--surface-variant) !important; }

  /* ── Client rows ───────────────────────────────────────────── */

  .awg-client-row { transition: background-color .15s ease; border-radius: var(--radius-list-row); }
  .awg-client-row:hover { background-color: var(--surface-container-highest); }
  .awg-client-connected { background: var(--connected-fill); border: 1.5px solid var(--connected-stroke); border-radius: var(--radius-list-row); }
  .awg-stats-strip { display:flex; gap: var(--space-xl); border-top: 1px solid var(--outline-variant); margin-top: var(--space-md); padding-top: var(--space-md); }
  .awg-stat-label { font-size: var(--type-stat-label); font-weight: var(--weight-semibold); letter-spacing: .05em; text-transform: uppercase; color: var(--on-surface-variant); }
  .awg-stat-value { font-family: var(--font-mono); font-size: var(--type-mono); }
  .awg-stat-value--rate { color: var(--primary); }
  .awg-stat-value--meta { color: var(--on-surface); }

  /* ── Monospace data ────────────────────────────────────────── */

  .awg-mono { font-family: var(--font-mono) !important; font-size: var(--type-mono); letter-spacing: -0.01em; }

  /* ── Avatar ────────────────────────────────────────────────── */

  .awg-avatar { background: var(--surface-container-highest); border-radius: 12px; }

  /* ── Inputs ────────────────────────────────────────────────── */

  input[type="text"], input[type="password"] {
    font-family: var(--font-sans) !important;
    background: var(--surface-container) !important;
    border: 1px solid var(--outline-variant) !important;
    color: var(--on-surface) !important;
    border-radius: var(--radius-input) !important;
    transition: border-color .15s ease, box-shadow .15s ease !important;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--primary) !important;
    box-shadow: 0 0 0 1px var(--primary) !important;
    outline: none !important;
  }
  input.awg-invalid { border-color: var(--error) !important; }
  input::placeholder { color: var(--on-surface-variant); opacity: 0.7; }

  /* ── Modals ────────────────────────────────────────────────── */

  .awg-modal-overlay { background: rgba(16,24,40,.45); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
  .awg-modal { background: var(--surface-container-lowest) !important; border-radius: 18px !important; border: none !important; box-shadow: var(--elevation-modal) !important; }
  .awg-modal-footer { background: var(--surface-container-low); border-top: 1px solid var(--outline-variant); }

  /* ── Danger well ───────────────────────────────────────────── */

  .awg-danger-well { background: var(--error-container); color: var(--on-error-container); border-radius: var(--radius-input); }

  /* ── Login page ────────────────────────────────────────────── */

  .awg-login-card {
    border-radius: var(--radius-card) !important;
    background: var(--surface-container) !important;
    border: 1px solid var(--outline-variant) !important;
    box-shadow: none !important;
  }

  .awg-login-avatar {
    background: var(--primary) !important;
    box-shadow: none;
  }

  /* ── Update banner ─────────────────────────────────────────── */

  .awg-update-banner {
    background: var(--primary-container) !important;
    color: var(--on-primary-container) !important;
    border: none !important;
    border-radius: var(--radius-card) !important;
  }

  .awg-update-btn {
    background: var(--primary) !important;
    color: var(--on-primary) !important;
    border: none !important;
    border-radius: var(--radius-input) !important;
  }

  .awg-update-btn:hover {
    filter: brightness(0.96);
  }

  /* ── Scrollbar ─────────────────────────────────────────────── */

  ::-webkit-scrollbar {
    width: 6px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: var(--surface-variant);
    border-radius: 3px;
  }

  /* ── Loading spinner ───────────────────────────────────────── */

  .awg-spinner { color: var(--primary) !important; }

  /* ── Fade-in animation ─────────────────────────────────────── */

  @keyframes awg-fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .awg-fade-in {
    animation: awg-fade-in 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
  }

  /* Staggered children */
  .awg-stagger > *:nth-child(1) { animation-delay: 0.05s; }
  .awg-stagger > *:nth-child(2) { animation-delay: 0.1s; }
  .awg-stagger > *:nth-child(3) { animation-delay: 0.15s; }
  .awg-stagger > *:nth-child(4) { animation-delay: 0.2s; }
  .awg-stagger > *:nth-child(5) { animation-delay: 0.25s; }
  .awg-stagger > *:nth-child(6) { animation-delay: 0.3s; }
  .awg-stagger > *:nth-child(7) { animation-delay: 0.35s; }
  .awg-stagger > *:nth-child(8) { animation-delay: 0.4s; }
  .awg-stagger > *:nth-child(9) { animation-delay: 0.45s; }
  .awg-stagger > *:nth-child(10) { animation-delay: 0.5s; }

  /* ── Disabled state ────────────────────────────────────────── */

  .is-disabled {
    opacity: 0.35;
    cursor: not-allowed !important;
  }

  /* ── QR Code modal ─────────────────────────────────────────── */

  .awg-qr-card { border-radius: 18px; padding: var(--space-xl); background: #fff; box-shadow: var(--elevation-modal); }

  /* ── Read-only anatomy (badge / chip / field-row) ──────────── */

  .awg-badge { display:inline-flex; align-items:center; background: var(--primary-container); color: var(--on-primary-container); font-size: 10px; font-weight: var(--weight-bold); letter-spacing: .05em; text-transform: uppercase; padding: 2px 8px; border-radius: var(--radius-pill); }
  .awg-chip { display:inline-flex; gap:6px; font-family: var(--font-mono); font-size:12px; background: var(--surface-container-highest); border: 1px solid var(--outline-variant); border-radius: var(--radius-pill); padding: 3px 10px; }

  .awg-field-row { display:flex; flex-direction:column; gap:2px; padding: 9px 0; border-bottom: 1px solid var(--outline-variant); }
  .awg-field-row:last-child { border-bottom: none; }
  .awg-field-label { font-size: var(--type-field-label); color: var(--on-surface-variant); }
  .awg-field-value { font-size: var(--type-field-value); font-weight: var(--weight-semibold); color: var(--on-surface); }
  .awg-field-value.mono { font-family: var(--font-mono); }
  .awg-section-label { font-size: var(--type-section); font-weight: var(--weight-bold); letter-spacing:.12em; text-transform:uppercase; color: var(--primary); padding-left: 4px; margin: 7px 0 4px; }

  /* ── Responsive tweaks ─────────────────────────────────────── */

  @media (max-width: 640px) {
    .awg-title {
      font-size: 1.5rem;
    }
  }

  /* ── Dark mode card header border ──────────────────────────── */

  .awg-card-header {
    border-bottom: 1px solid var(--outline-variant);
  }

  /* ── Header toolbar buttons ────────────────────────────────── */

  .awg-toolbar-btn { width:38px; height:38px; border-radius: var(--radius-pill); display:flex; align-items:center; justify-content:center; background: var(--surface-container-high); color: var(--on-surface-variant); border:none; cursor:pointer; transition: background-color .15s ease, color .15s ease; }
  .awg-toolbar-btn:hover { background: var(--surface-container-highest); color: var(--on-surface); }

  /* ── Server settings screen ─────────────────────────────────── */
  .awg-screen-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .awg-section-label { font-size:11px; font-weight:700; text-transform:uppercase; color:var(--primary); letter-spacing:.12em; margin:0 0 7px 4px; }
  .awg-group { margin-bottom:12px; }
  .awg-group-body > * + * { border-top:1px solid var(--outline-variant); }
  .awg-field { display:flex; flex-direction:column; gap:4px; padding:9px 0; }
  .awg-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:9px 0; }
  .awg-grid-2 .awg-field { padding:0; border:none; }
  .awg-field-label { font-size:12px; color:var(--on-surface-variant); }
  .awg-field-helper { font-size:12px; color:var(--on-surface-variant); }
  .awg-field-helper.is-error { color:var(--error); }
  .awg-input { width:100%; background:var(--surface-container); border:1px solid var(--outline-variant); border-radius:12px; padding:12px; color:var(--on-surface); outline:none; box-sizing:border-box; transition:border-color .15s ease; }
  .awg-input:focus { border:2px solid var(--primary); padding:11px; }
  .awg-input.is-invalid { border-color:var(--error); }
  .awg-input.awg-mono { font-family:var(--font-mono); }
  .awg-restart-notice { display:flex; gap:10px; align-items:flex-start; background:var(--surface-container-highest); border:1px solid var(--outline-variant); border-radius:12px; padding:12px; font-size:13px; color:var(--on-surface-variant); margin-bottom:12px; }
  .awg-chip { display:inline-block; font-family:var(--font-mono); font-size:12px; background:var(--surface-container-highest); border:1px solid var(--outline-variant); border-radius:var(--radius-pill); padding:4px 10px; color:var(--on-surface); }
  .awg-chip .awg-chip-k { color:var(--on-surface-variant); }
  .awg-expander { width:100%; display:flex; align-items:center; justify-content:space-between; background:none; border:none; cursor:pointer; color:var(--on-surface); font-weight:600; padding:9px 0; }
  .awg-help { display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px; border-radius:var(--radius-pill); background:var(--surface-container-highest); color:var(--on-surface-variant); font-size:10px; font-weight:700; cursor:help; margin-left:6px; vertical-align:middle; }
  .awg-readonly-value { font-family:var(--font-mono); color:var(--on-surface-variant); background:var(--surface-container-highest); border:1px solid var(--outline-variant); border-radius:12px; padding:12px; }
  @media (max-width:520px) { .awg-grid-2 { grid-template-columns:1fr; } }

  /* ── Version badge ─────────────────────────────────────────── */

  .awg-version { font-family: var(--font-mono) !important; font-size: 11px; padding: 2px 8px; border-radius: var(--radius-pill); background: var(--primary-container); color: var(--on-primary-container); font-weight: var(--weight-semibold); }
</style>

<body>
  <div id="app">
    <div v-cloak class="container mx-auto max-w-3xl px-3 md:px-0 mt-4 xs:mt-6">
      <div v-if="authenticated === true">
        <div class="flex flex-col-reverse xxs:flex-row flex-auto items-center items-end gap-3 awg-fade-in">
          <h1 class="dark:text-neutral-200 flex-grow self-start mb-4 flex items-center gap-3">
            <img v-if="theme !== 'dark'" src="./img/signal-mark-light.svg" width="36" class="inline align-middle" />
            <img v-else src="./img/signal-mark.svg" width="36" class="inline align-middle" />
            <div>
              <span class="awg-title">AmneziaWG</span>
              <div class="awg-subtitle">secure tunnel</div>
            </div>
          </h1>
          <div class="flex items-center grow-0 gap-2 items-end self-end xxs:self-center">
            <!-- Dark / light theme -->
            <button @click="toggleTheme"
              class="awg-toolbar-btn transition" :title="$t(`theme.${uiTheme}`)">
              <svg v-if="uiTheme === 'light'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
              </svg>
              <svg v-else-if="uiTheme === 'dark'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
              </svg>
              <svg v-else xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"
                class="w-5 h-5">
                <path
                  d="M12,2.2c-5.4,0-9.8,4.4-9.8,9.8s4.4,9.8,9.8,9.8s9.8-4.4,9.8-9.8S17.4,2.2,12,2.2z M3.8,12c0-4.5,3.7-8.2,8.2-8.2v16.5C7.5,20.2,3.8,16.5,3.8,12z" />
              </svg>
            </button>
            <!-- Show / hide charts -->
            <label v-if="uiChartType > 0" class="awg-toolbar-btn cursor-pointer whitespace-nowrap transition group" :title="$t('toggleCharts')">
              <input type="checkbox" value="" class="sr-only peer" v-model="uiShowCharts" @change="toggleCharts">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" fill="currentColor"
                class="w-5 h-5 peer fill-gray-400 peer-checked:fill-gray-600 dark:fill-neutral-600 peer-checked:dark:fill-neutral-400 transition">
                  <path
                    d="M18.375 2.25c-1.035 0-1.875.84-1.875 1.875v15.75c0 1.035.84 1.875 1.875 1.875h.75c1.035 0 1.875-.84 1.875-1.875V4.125c0-1.036-.84-1.875-1.875-1.875h-.75ZM9.75 8.625c0-1.036.84-1.875 1.875-1.875h.75c1.036 0 1.875.84 1.875 1.875v11.25c0 1.035-.84 1.875-1.875 1.875h-.75a1.875 1.875 0 0 1-1.875-1.875V8.625ZM3 13.125c0-1.036.84-1.875 1.875-1.875h.75c1.036 0 1.875.84 1.875 1.875v6.75c0 1.035-.84 1.875-1.875 1.875h-.75A1.875 1.875 0 0 1 3 19.875v-6.75Z" />
              </svg>
            </label>
            <!-- Server settings -->
            <button @click="openServerSettings()"
              class="awg-toolbar-btn transition" :title="$t('serverSettings.title')">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 0 1-3-3m3 3a3 3 0 1 0 0 6h13.5a3 3 0 1 0 0-6m-16.5-3a3 3 0 0 1 3-3h13.5a3 3 0 0 1 3 3m-19.5 0a4.5 4.5 0 0 1 .9-2.7L5.737 5.1a3.375 3.375 0 0 1 2.7-1.35h7.126c1.062 0 2.062.5 2.7 1.35l2.587 3.45a4.5 4.5 0 0 1 .9 2.7m0 0a3 3 0 0 1-3 3m0 3h.008v.008h-.008v-.008Zm0-6h.008v.008h-.008v-.008Zm-3 6h.008v.008h-.008v-.008Zm0-6h.008v.008h-.008v-.008Z" />
              </svg>
            </button>
            <span v-if="requiresPassword"
              class="text-sm text-gray-400 dark:text-neutral-400 cursor-pointer hover:underline"
              @click="logout">
              {{$t("logout")}}
              <svg class="h-3 inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
            </span>
          </div>
        </div>
        <div class="text-sm text-gray-400 dark:text-neutral-400 mb-5"></div>
        <template v-if="view === 'clients'">
        <div v-if="latestRelease"
          class="awg-update-banner p-4 text-sm font-small mb-10 awg-fade-in"
          :title="`v${currentRelease} → v${latestRelease.version}`">
          <div class="container mx-auto flex flex-row flex-auto items-center">
            <div class="flex-grow">
              <p class="font-bold">{{$t("updateAvailable")}} <span class="awg-mono">v{{currentRelease}} → v{{latestRelease.version}}</span></p>
              <p style="opacity: 0.85">{{latestRelease.changelog}}</p>
            </div>

            <a href="https://github.com/creatorofuniverses/amnezia-wg-easy#updating" target="_blank"
              class="awg-update-btn p-3 float-right font-sm font-semibold flex-shrink-0 transition-all">
              {{$t("update")}} →
            </a>
          </div>
        </div>

        <div class="awg-card awg-fade-in" style="animation-delay: 0.1s">
          <div class="flex flex-row flex-auto items-center p-3 px-5 awg-card-header">
            <div class="flex-grow">
              <p class="text-2xl font-semibold dark:text-neutral-200" style="letter-spacing: -0.02em">{{$t("clients")}}</p>
            </div>
            <div class="flex-shrink-0">
              <button @click="clientCreate = true; clientCreateName = '';"
                class="awg-btn awg-btn-primary py-2 px-4 inline-flex items-center">
                <svg class="w-4 mr-2" inline xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                  stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                </svg>
                <span class="text-sm">{{$t("new")}}</span>
              </button>
            </div>
          </div>

          <div class="awg-stagger">
            <!-- Client -->
            <div v-if="clients && clients.length > 0" v-for="client in clients" :key="client.id"
              class="awg-client-row awg-fade-in relative overflow-hidden border-b last:border-b-0 border-gray-100 dark:border-neutral-600 border-solid"
              :class="{ 'awg-client-connected': isConnected(client) }"
              style="border-color: var(--outline-variant)">

              <!-- Chart -->
              <div v-if="uiChartType" class="absolute z-0 bottom-0 left-0 right-0 h-6" >
                <apexchart width="100%" height="100%" :options="chartOptionsTX" :series="client.transferTxSeries">
                </apexchart>
              </div>
              <div v-if="uiChartType" class="absolute z-0 top-0 left-0 right-0 h-6" >
                <apexchart width="100%" height="100%" :options="chartOptionsRX" :series="client.transferRxSeries"
                  style="transform: scaleY(-1);">
                </apexchart>
              </div>

              <div class="relative py-3 md:py-5 px-3 z-10 flex flex-col sm:flex-row justify-between gap-3">
                <div class="flex gap-3 md:gap-4 w-full items-center ">

                  <!-- Avatar -->
                  <div class="awg-avatar h-10 w-10 mt-2 self-start relative flex-shrink-0" style="min-width: 2.5rem">
                    <svg class="w-6 m-2 text-gray-300 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                      fill="currentColor">
                      <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
                        clip-rule="evenodd" />
                    </svg>
                    <img v-if="client.avatar" :src="client.avatar" class="w-10 absolute top-0 left-0" style="border-radius: 12px" />

                    <div v-if="isConnected(client)">
                      <div class="w-2 h-2 awg-online-dot rounded-full absolute bottom-0 right-0"></div>
                    </div>
                    <div v-else>
                      <div class="w-2 h-2 awg-offline-dot rounded-full absolute bottom-0 right-0"></div>
                    </div>
                  </div>

                  <!-- Name & Info -->
                  <div class="flex flex-col xxs:flex-row w-full gap-2">

                    <!-- Name -->
                    <div class="flex flex-col flex-grow gap-1">
                      <div class="text-gray-700 dark:text-neutral-200 group text-sm md:text-base font-medium"
                        :title="$t('createdOn') + dateTime(new Date(client.createdAt))">

                        <!-- Show -->
                        <input v-show="clientEditNameId === client.id" v-model="clientEditName"
                          v-on:keyup.enter="updateClientName(client, clientEditName); clientEditName = null; clientEditNameId = null;"
                          v-on:keyup.escape="clientEditName = null; clientEditNameId = null;"
                          :ref="'client-' + client.id + '-name'"
                          class="rounded px-1 border-2 dark:bg-neutral-700 border-gray-100 dark:border-neutral-600 focus:border-gray-200 dark:focus:border-neutral-500 dark:placeholder:text-neutral-500 outline-none w-30" />
                        <span v-show="clientEditNameId !== client.id"
                          class="border-t-2 border-b-2 border-transparent">{{client.name}}</span>

                        <!-- Edit -->
                        <span v-show="clientEditNameId !== client.id"
                          @click="clientEditName = client.name; clientEditNameId = client.id; setTimeout(() => $refs['client-' + client.id + '-name'][0].select(), 1);"
                          class="cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity">
                          <svg xmlns="http://www.w3.org/2000/svg"
                            class="h-4 w-4 inline align-middle opacity-25 hover:opacity-100" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                          </svg>
                        </span>
                      </div>
                      <!-- Address -->
                      <div class="block md:inline-block pb-1 md:pb-0 text-gray-500 dark:text-neutral-400 awg-mono">
                        <span class="group">
                          <!-- Show -->
                          <input v-show="clientEditAddressId === client.id" v-model="clientEditAddress"
                            v-on:keyup.enter="updateClientAddress(client, clientEditAddress); clientEditAddress = null; clientEditAddressId = null;"
                            v-on:keyup.escape="clientEditAddress = null; clientEditAddressId = null;"
                            :ref="'client-' + client.id + '-address'"
                            class="rounded border-2 dark:bg-neutral-700 border-gray-100 dark:border-neutral-600 focus:border-gray-200 dark:focus:border-neutral-500 outline-none w-20 text-black dark:text-neutral-300 dark:placeholder:text-neutral-500" />
                          <span v-show="clientEditAddressId !== client.id"
                            class="inline-block">{{client.address}}</span>

                          <!-- Edit -->
                          <span v-show="clientEditAddressId !== client.id"
                            @click="clientEditAddress = client.address; clientEditAddressId = client.id; setTimeout(() => $refs['client-' + client.id + '-address'][0].select(), 1);"
                            class="cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg xmlns="http://www.w3.org/2000/svg"
                              class="h-4 w-4 inline align-middle opacity-25 hover:opacity-100" fill="none"
                              viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                            </svg>
                          </span>
                        </span>
                        <!-- Inline Transfer TX -->
                        <span v-if="!uiTrafficStats && !isConnected(client) && client.transferTx" class="whitespace-nowrap" :title="$t('totalDownload') + bytes(client.transferTx)">
                          ·
                          <svg class="align-middle h-3 inline" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                              d="M16.707 10.293a1 1 0 010 1.414l-6 6a1 1 0 01-1.414 0l-6-6a1 1 0 111.414-1.414L9 14.586V3a1 1 0 012 0v11.586l4.293-4.293a1 1 0 011.414 0z"
                              clip-rule="evenodd" />
                          </svg>
                          {{client.transferTxCurrent | bytes}}/s
                        </span>

                        <!-- Inline Transfer RX -->
                        <span v-if="!uiTrafficStats && !isConnected(client) && client.transferRx" class="whitespace-nowrap" :title="$t('totalUpload') + bytes(client.transferRx)">
                          ·
                          <svg class="align-middle h-3 inline" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                              d="M3.293 9.707a1 1 0 010-1.414l6-6a1 1 0 011.414 0l6 6a1 1 0 01-1.414 1.414L11 5.414V17a1 1 0 11-2 0V5.414L4.707 9.707a1 1 0 01-1.414 0z"
                              clip-rule="evenodd" />
                          </svg>
                          {{client.transferRxCurrent | bytes}}/s
                        </span>
                        <!-- Last seen -->
                        <span class="text-gray-400 dark:text-neutral-500 whitespace-nowrap" v-if="client.latestHandshakeAt && (uiTrafficStats || !isConnected(client))"
                          :title="$t('lastSeen') + dateTime(new Date(client.latestHandshakeAt))">
                          {{!uiTrafficStats ? " · " : ""}}{{new Date(client.latestHandshakeAt) | timeago}}
                        </span>
                      </div>

                      <!-- Advanced / site peer expander -->
                      <details class="text-xs mt-1">
                        <summary class="cursor-pointer text-gray-400 dark:text-neutral-500 select-none">
                          {{ $t('advancedSitePeer') }}
                          <span v-if="client.allowedIPs" class="ml-1 inline-block px-1.5 rounded awg-chip text-gray-600 dark:text-neutral-400" style="font-size:10px;padding:1px 6px">site</span>
                        </summary>
                        <div class="mt-2 flex flex-col gap-1.5">
                          <input
                            v-model="client._allowedIPsDraft"
                            :placeholder="$t('allowedIPsPlaceholder')"
                            class="rounded border-2 dark:bg-neutral-700 border-gray-100 dark:border-neutral-600 focus:border-gray-200 dark:focus:border-neutral-500 outline-none text-black dark:text-neutral-300 awg-mono px-1 py-0.5 w-48" />
                          <p class="text-gray-400 dark:text-neutral-500">{{ $t('allowedIPsHelp') }}</p>
                          <label class="flex items-center gap-1.5 cursor-pointer text-gray-500 dark:text-neutral-400">
                            <input type="checkbox"
                              v-model="client._masqDraft" />
                            {{ $t('masqueradePeer') }}
                          </label>
                          <button
                            @click="saveClientSitePeer(client, client._allowedIPsDraft, client._masqDraft)"
                            class="awg-btn self-start py-0.5 px-2 text-xs">{{ $t('save') }}</button>
                        </div>
                      </details>
                    </div>

                    <!-- Info -->
                    <div v-if="uiTrafficStats"
                      class="flex gap-2 items-center shrink-0 text-gray-400 dark:text-neutral-400 awg-mono mt-px justify-end">

                      <!-- Transfer TX -->
                      <div class="min-w-20 md:min-w-24" v-if="client.transferTx">
                        <span class="flex gap-1" :title="$t('totalDownload') + bytes(client.transferTx)">
                          <svg class="align-middle h-3 inline mt-0.5" xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                              d="M16.707 10.293a1 1 0 010 1.414l-6 6a1 1 0 01-1.414 0l-6-6a1 1 0 111.414-1.414L9 14.586V3a1 1 0 012 0v11.586l4.293-4.293a1 1 0 011.414 0z"
                              clip-rule="evenodd" />
                          </svg>
                          <div>
                            <span class="text-gray-700 dark:text-neutral-200">{{client.transferTxCurrent |
                              bytes}}/s</span>
                            <!-- Total TX -->
                            <br><span class="font-regular" style="font-size:0.85em">{{bytes(client.transferTx)}}</span>
                          </div>
                        </span>

                      </div>

                      <!-- Transfer RX -->
                      <div class="min-w-20 md:min-w-24" v-if="client.transferRx">
                        <span class="flex gap-1" :title="$t('totalUpload') + bytes(client.transferRx)">

                          <svg class="align-middle h-3 inline mt-0.5" xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                              d="M3.293 9.707a1 1 0 010-1.414l6-6a1 1 0 011.414 0l6 6a1 1 0 01-1.414 1.414L11 5.414V17a1 1 0 11-2 0V5.414L4.707 9.707a1 1 0 01-1.414 0z"
                              clip-rule="evenodd" />
                          </svg>
                          <div>
                            <span class="text-gray-700 dark:text-neutral-200">{{client.transferRxCurrent |
                              bytes}}/s</span>
                            <!-- Total RX -->
                            <br><span class="font-regular" style="font-size:0.85em">{{bytes(client.transferRx)}}</span>
                          </div>
                        </span>
                      </div>

                    </div>
                  </div>
                </div>

                <div class="flex items-center justify-end">
                  <div class="flex gap-1 items-center justify-between">

                    <!-- Enable/Disable -->
                    <div @click="disableClient(client)" v-if="client.enabled === true" :title="$t('disableClient')"
                      class="awg-toggle-on inline-block align-middle rounded-full w-10 h-6 mr-1 cursor-pointer transition-all">
                      <div class="rounded-full w-4 h-4 m-1 ml-5 bg-white"></div>
                    </div>

                    <div @click="enableClient(client)" v-if="client.enabled === false" :title="$t('enableClient')"
                      class="awg-toggle-off inline-block align-middle rounded-full w-10 h-6 mr-1 cursor-pointer transition-all">

                      <div class="rounded-full w-4 h-4 m-1 bg-white"></div>
                    </div>

                    <!-- Download Config -->
                    <a :disabled="!client.downloadableConfig"
                      :href="'./api/wireguard/client/' + client.id + '/configuration'"
                      :download="client.downloadableConfig ? 'configuration' : null"
                      class="awg-icon-btn align-middle inline-block text-gray-400 dark:text-neutral-400 transition"
                      :class="{
                        'is-disabled': !client.downloadableConfig
                      }"
                      :title="!client.downloadableConfig ? $t('noPrivKey') : $t('downloadConfig')"
                      @click="if(!client.downloadableConfig) { $event.preventDefault(); }">
                      <svg class="w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                      </svg>
                    </a>

                    <!-- QR Code -->
                    <button v-if="client.downloadableConfig"
                      class="awg-icon-btn align-middle text-gray-400 dark:text-neutral-400 transition"
                      :title="$t('showQR')"
                      @click="qrcode = './api/wireguard/client/' + client.id + '/qrcode.svg'">
                      <svg class="w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                      </svg>
                    </button>

                    <!-- Copy share link -->
                    <button v-if="client.downloadableConfig"
                      class="awg-icon-btn align-middle text-gray-400 dark:text-neutral-400 transition"
                      :title="copiedClientId === client.id ? $t('copied') : $t('copyShareLink')"
                      @click="copyShareLink(client)">
                      <svg v-if="copiedClientId === client.id" class="w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                      </svg>
                      <svg v-else class="w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 010 5.656l-3 3a4 4 0 01-5.656-5.656l1.5-1.5m6.328-1.328a4 4 0 010-5.656l3-3a4 4 0 015.656 5.656l-1.5 1.5" />
                      </svg>
                    </button>

                    <!-- Legacy (no-imitation) toggle -->
                    <button
                      class="awg-icon-btn align-middle transition"
                      :class="{ 'awg-icon-btn--active': client.legacy }"
                      :title="client.legacy ? $t('legacyOn') : $t('legacyOff')"
                      @click="toggleClientLegacy(client)">
                      <svg class="w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                      </svg>
                    </button>

                    <!-- Delete -->
                    <button
                      class="awg-icon-btn align-middle transition"
                      :title="$t('deleteClient')" @click="clientDelete = client">
                      <svg class="w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                          d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
                          clip-rule="evenodd" />
                      </svg>
                    </button>
                  </div>
                </div>

                <!-- Stats strip — connected clients only -->
                <div class="awg-stats-strip" v-if="!uiTrafficStats && isConnected(client)">
                  <div>
                    <div class="awg-stat-label">{{$t('totalDownload')}}</div>
                    <div class="awg-stat-value awg-stat-value--rate">{{client.transferTx | bytes}}</div>
                  </div>
                  <div>
                    <div class="awg-stat-label">{{$t('totalUpload')}}</div>
                    <div class="awg-stat-value awg-stat-value--rate">{{client.transferRx | bytes}}</div>
                  </div>
                  <div>
                    <div class="awg-stat-label">HANDSHAKE</div>
                    <div class="awg-stat-value awg-stat-value--meta">{{new Date(client.latestHandshakeAt) | timeago}}</div>
                  </div>
                </div>

              </div>

            </div>
            <div v-if="clients && clients.length === 0" class="flex flex-col items-center justify-center text-center" style="padding: var(--space-xl) 0;">
              <div style="background: var(--surface-container-highest); border-radius: var(--space-xl); padding: var(--space-xl);">
                <img :src="theme !== 'dark' ? './img/signal-mark-light.svg' : './img/signal-mark.svg'" width="40" />
              </div>
              <p class="awg-subtitle" style="margin-top: var(--space-md);">{{$t('noClients') || 'No clients yet'}}</p>
            </div>
            <div v-if="clients === null" class="p-5">
              <svg class="w-5 animate-spin mx-auto awg-spinner" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                fill="currentColor">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
              </svg>
            </div>
          </div>
        </div>
        </template>

        <template v-else-if="view === 'server-settings'">
          <div class="awg-fade-in">
            <div class="awg-screen-header">
              <button @click="closeServerSettings()" class="awg-toolbar-btn" :title="$t('serverSettings.back')">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
